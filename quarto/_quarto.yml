project:
  type: website
  output-dir: ../docs

website:
  title: "Bayesian Assignment"
  description: "Bayesian Analysis of Syntopy"
  repo-url: "https://github.com/matejtvar/Bayesian_syntopy/issues/new?assignees=matejtvar"
  repo-actions: [issue]
  
  navbar:
    background: primary
    search: false 
    right:
      - text: "Portfolio"
        href: "https://matejtvar.github.io/"
      - icon: github
        text: ""
        href: "https://github.com/matejtvar/Bayesian_syntopy"

  page-footer:
    left: "© 2026 Matěj Tvarůžka"
    right: "Built with R Studio & Quarto"

format:
  html:
    theme: 
      light: flatly
      dark: darkly
    toc: true
    df-print: kable
    toc-location: right
    number-sections: true
    number-depth: 3
    code-fold: false
    code-summary: "View Code"
    code-copy: true
    grid:
      body-width: 1100px